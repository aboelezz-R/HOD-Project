<!DOCTYPE html>
<html>

<head>

    <title>Maids.cc HOD Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {

            margin: 0;
            height: 100vh;
            background: #25499B;

            display: flex;
            align-items: center;
            justify-content: center;

        }


        .login-card {

            background: white;
            width: 380px;

            padding: 40px;

            border-radius: 18px;

            box-shadow: 0 20px 50px rgba(0, 0, 0, .2);

        }


        .logo {

            font-size: 26px;
            font-weight: 700;
            color: #25499B;
            margin-bottom: 30px;

        }


        .google-btn {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #374151;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .google-btn:hover {
            background: #f9fafb;
            opacity: 1;
        }
    </style>

</head>


<body>


    <div class="login-card">


        <div class="logo">
            Maids.cc
        </div>


        <h2>
            HOD Login
        </h2>

        <button class="google-btn" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
            </svg>
            Sign in with Google
        </button>

    </div>





    <script type="module">


        import { supabase } from "./js/supabase.js"
        import { showToast } from "./js/ui.js"



        window.loginWithGoogle = async function () {
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + window.location.pathname }
            })
        }

        // If we just came back from Google, finish the login
        async function handleGoogleRedirect() {
            const { data: { session } } = await supabase.auth.getSession()
            if (!session) return

            const email = (session.user.email || "").toLowerCase()

            if (!email.endsWith("@maids.cc")) {
                showToast("Only @maids.cc Google accounts are allowed.")
                await supabase.auth.signOut()
                return
            }

            const username = email.split("@")[0]

            let { data: profile, error } = await supabase
                .from("profiles")
                .select("*")
                .eq("username", username)
                .single()

            if (error || !profile) {
                const { data: created, error: createError } = await supabase
                    .from("profiles")
                    .insert({ username, password: crypto.randomUUID() })
                    .select()
                    .single()

                if (createError) {
                    showToast(createError.message)
                    await supabase.auth.signOut()
                    return
                }
                profile = created
            }

            localStorage.setItem("hod", JSON.stringify(profile))
            window.location.href = "dashboard.html"
        }

        handleGoogleRedirect()

    </script>



</body>

</html>
